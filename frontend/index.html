<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#FFD600" />
    <meta name="google" content="notranslate" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Quests HK" />
    <title>Quests HK</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      .goog-te-banner-frame { display: none !important; }
      .skiptranslate > iframe { display: none !important; }
      body { top: 0 !important; }
      #goog-gt-tt, .goog-te-balloon-frame, .goog-tooltip { display: none !important; }
    </style>
  </head>
  <body>
    <div id="google_translate_element" style="display:none"></div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      function googleTranslateElementInit() {
        new google.translate.TranslateElement(
          { pageLanguage: 'ru', autoDisplay: false },
          'google_translate_element'
        );
      }
    </script>
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    <script>
      // Keep the toolbar hidden even after Google Translate reinjects it
      function hideGTBar() {
        var bar = document.querySelector('.goog-te-banner-frame');
        if (bar) bar.style.display = 'none';
        document.body.style.top = '0';
        document.body.style.position = '';
      }
      var gtObserver = new MutationObserver(hideGTBar);
      gtObserver.observe(document.documentElement, { childList: true, subtree: true });
      setInterval(hideGTBar, 500);
    </script>
  </body>
</html>
